# =========================
# HTTP → HTTPS redirect (Frontend)
# =========================
server {
    listen 80;
    listen [::]:80;
    server_name core.admitra.io www.core.admitra.io;

    return 301 https://core.admitra.io$request_uri;
}

# =========================
# HTTP → HTTPS redirect (API)
# =========================
server {
    listen 80;
    listen [::]:80;
    server_name api.core.admitra.io;

    return 301 https://api.core.admitra.io$request_uri;
}

# =========================
# FRONTEND (Next.js / React)
# =========================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name core.admitra.io www.core.admitra.io;

    ssl_certificate /etc/letsencrypt/live/core.admitra.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/core.admitra.io/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_cache_bypass $http_upgrade;
    }
}


# =========================
# BACKEND API
# =========================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.core.admitra.io;

    ssl_certificate /etc/letsencrypt/live/core.admitra.io-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/core.admitra.io-0001/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 15M;

    location / {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
